name: CI — Lint and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_transformations.py \
            -k "TestSentiment or TestCDC"

      - name: Run sentiment + generator tests
        run: |
          pytest tests/test_transformations.py \
            -v --tb=short \
            -k "TestSentiment or TestCDC or TestGeneratorOutput"

      - name: Lint with Ruff (optional, non-blocking)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src/ data_generator/ tests/ --ignore E501

  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required pipeline files..."
          required_files=(
            "databricks.yml"
            "README.md"
            "src/pipeline.py"
            "data_generator/generate_call_stream.py"
            "src/bronze/bronze_calls.py"
            "src/bronze/bronze_customers.py"
            "src/silver/silver_calls_clean.py"
            "src/silver/silver_customers_scd2.py"
            "src/gold/gold_sentiment_daily.py"
            "src/gold/gold_call_volume_daily.py"
            "src/gold/gold_high_risk_customers.py"
            "src/gold/gold_region_sentiment.py"
            "src/gold/gold_subscription_sentiment.py"
            "tests/test_transformations.py"
            "docs/data_dictionary.md"
          )
          failed=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              failed=1
            else
              echo "OK: $f"
            fi
          done
          exit $failed
